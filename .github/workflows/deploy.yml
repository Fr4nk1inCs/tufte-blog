name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tola
        run: |
          curl -fsSL https://github.com/tola-ssg/tola-ssg/releases/latest/download/tola-x86_64-linux-static.tar.gz | tar -xz
          sudo mv tola /usr/local/bin/

      - name: Build
        run: |
          tola build --clean --minify --rss

      - name: Display structure of built files
        run: |
          ls -R public

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
